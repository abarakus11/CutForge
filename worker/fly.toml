app = "cutforge-clip-worker"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  WHISPER_MODEL = "small"
  PORT = "3001"
