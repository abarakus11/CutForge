services:
  - type: web
    name: cutforge-clip-worker
    runtime: docker
    dockerfilePath: ./worker/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: WHISPER_MODEL
        value: small
      - key: PORT
        value: "3001"
      - key: YT_DLP_PATH
        value: /usr/local/bin/yt-dlp
