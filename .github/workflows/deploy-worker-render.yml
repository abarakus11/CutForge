name: Deploy clip worker (Render)

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - "lib/captions-core.ts"
      - "lib/transcription-langs.ts"
      - "render.yaml"
      - ".github/workflows/deploy-worker-render.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_API_KEY != '' && secrets.RENDER_OWNER_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -n "$RENDER_SERVICE_ID" ]; then
            curl -fsS -X POST \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
              -d '{"clearCache":"do_not_clear"}'
            echo "Deploy triggered for service $RENDER_SERVICE_ID"
          else
            echo "RENDER_SERVICE_ID not set — create the service once via Blueprint (render.yaml) on Render."
          fi
